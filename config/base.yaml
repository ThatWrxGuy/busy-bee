system:
  name: BusyBee
  doctrine_version: "1.1"
  environment: local

training:
  dataset_name: synthetic_classification
  n_samples: 300
  n_features: 8
  n_informative: 5
  n_redundant: 1
  n_classes: 2
  test_size: 0.2
  random_state: 42
  model_name: baseline_logistic
  model_version: "0.2.0"
  max_iter: 1000

artifacts:
  root_dir: artifacts
